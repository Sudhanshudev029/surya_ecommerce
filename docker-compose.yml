services:
  db:
    image: postgres:16-alpine
    container_name: surya_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: surya
      POSTGRES_PASSWORD: surya
      POSTGRES_DB: surya_store
    ports:
      - "5433:5432"
    volumes:
      - surya_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surya -d surya_store"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  surya_pgdata:
