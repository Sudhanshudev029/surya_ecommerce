<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Surya Store">
  <defs>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- sun rays: one triangle, rotated 12× around the centre -->
  <g fill="url(#sun)">
    <polygon points="32,2.5 29.6,11.5 34.4,11.5"/>
    <polygon points="32,2.5 29.6,11.5 34.4,11.5" transform="rotate(30 32 32)"/>
    <polygon points="32,2.5 29.6,11.5 34.4,11.5" transform="rotate(60 32 32)"/>
    <polygon points="32,2.5 29.6,11.5 34.4,11.5" transform="rotate(90 32 32)"/>
    <polygon points="32,2.5 29.6,11.5 34.4,11.5" transform="rotate(120 32 32)"/>
    <polygon points="32,2.5 29.6,11.5 34.4,11.5" transform="rotate(150 32 32)"/>
    <polygon points="32,2.5 29.6,11.5 34.4,11.5" transform="rotate(180 32 32)"/>
    <polygon points="32,2.5 29.6,11.5 34.4,11.5" transform="rotate(210 32 32)"/>
    <polygon points="32,2.5 29.6,11.5 34.4,11.5" transform="rotate(240 32 32)"/>
    <polygon points="32,2.5 29.6,11.5 34.4,11.5" transform="rotate(270 32 32)"/>
    <polygon points="32,2.5 29.6,11.5 34.4,11.5" transform="rotate(300 32 32)"/>
    <polygon points="32,2.5 29.6,11.5 34.4,11.5" transform="rotate(330 32 32)"/>
  </g>

  <!-- sun core -->
  <circle cx="32" cy="32" r="16" fill="url(#sun)"/>

  <!-- shopping bag drawn as a white outline (orange shows through) -->
  <g transform="translate(32 31.5) scale(0.92) translate(-12 -12)"
     fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
    <path d="M3 6h18"/>
    <path d="M16 10a4 4 0 0 1-8 0"/>
  </g>
</svg>
